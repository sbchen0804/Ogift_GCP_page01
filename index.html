        .glass-panel {

        /* 閃爍動畫 */

        .animate-blink {

        }

        /* 跳轉提示遮罩 */
        #redirect-overlay {

        .new-top-banner {

            width: 100%;
            height: auto;
            margin: 0 auto;
            overflow: hidden;
            display: flex;
            align-items: center; 
            justify-content: center;
            background-color: var(--warm-beige);
        }
        @media (min-width: 768px) {
            .new-top-banner {
                max-width: 1600px; 
                max-height: 480px; /* [核心調整] 調高至 480px，達成最佳視覺比例 */
                padding-top: 25px;  /* 增加頂部間距，將圖片下移 */
                padding-bottom: 25px; /* 增加底部間距，確保不切到商品底部 */
                border-bottom-left-radius: 4rem;
                border-bottom-right-radius: 4rem;
                box-shadow: 0 20px 50px rgba(0,0,0,0.12);
            }
        }

        .new-top-banner .banner-img {
            width: 100%;
            height: 100%; 
            display: block;
            object-fit: contain; /* 確保商品與文案絕對不被裁切 */
        }

        /* 跑馬燈 */
        .marquee-box {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-blur: 8px;
            padding: 10px 0;
            overflow: hidden;
            z-index: 20;
            border-top: 1px solid rgba(150, 75, 0, 0.1);
        }
        .marquee-content {
            display: flex;
            width: max-content;
            animation: marquee-seamless 50s linear infinite;
        }
        .marquee-text-block {
            display: flex;
            white-space: nowrap;
        }
        .marquee-text {
            padding-right: 150px;
            white-space: nowrap;
            color: var(--earth-brown);
            font-weight: 900;
            font-size: 1.1rem;
        }
        @media (min-width: 768px) {
            .marquee-text { font-size: 1.45rem; }
        }
        @keyframes marquee-seamless {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .nav-circle {
            width: 95px; 
            height: 95px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 3px solid #f2f2f2;
            flex-shrink: 0;
        }
        @media (min-width: 768px) {
            .nav-circle { width: 165px; height: 165px; border-width: 4px; } 
        }
        .nav-circle.active {
            background: var(--primary-green);
            color: white !important;

        .manga-card {

        .floating-home {
            position: fixed;
            bottom: 25px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: var(--earth-brown);
            color: white;
            border-radius: 50%;

            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);

        .fade-in { animation: fadeInUp 0.8s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    <!-- 頁腳 -->
    <footer class="py-12 md:py-20 bg-[#1a240d] text-stone-500 text-center border-t-8 border-[#2d4c1e]">

            <div class="text-white font-black text-2xl md:text-3xl mb-6 tracking-[0.4em] uppercase text-center">Ogift 湧健康</div>

        </div>
    </footer>

    <script>
        // 商城跳轉邏輯
        function handleStoreRedirect() {
            const overlay = document.getElementById('redirect-overlay');
            const storeUrl = "https://ogift.com.tw/product/reishi-cordyceps-probiotics-capsules-3-pack/";
            
            overlay.style.display = 'flex';
            
            setTimeout(() => {
                const newWindow = window.open(storeUrl, '_blank');
                if (!newWindow || newWindow.closed || typeof newWindow.closed === 'undefined') {
                    window.location.href = storeUrl;
                }
                
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 500);
            }, 4000);
        }

        function goHomeFocus() {
            const marquee = document.getElementById('marquee-anchor');
            const nav = document.getElementById('top-nav');
            if(marquee && nav) {
                const navHeight = nav.offsetHeight; 
                const targetPos = marquee.getBoundingClientRect().top + window.pageYOffset - navHeight;
                window.scrollTo({ top: targetPos, behavior: 'smooth' });
            }
        }

        function switchSection(id) {
            document.querySelectorAll('.display-content').forEach(el => el.classList.add('hidden'));
            const targetContent = document.getElementById('display-' + id);
            if(targetContent) {
                targetContent.classList.remove('hidden');
            }

            document.querySelectorAll('.nav-circle').forEach(el => el.classList.remove('active'));
            const targetCircle = document.getElementById('circle-' + id);
            if(targetCircle) targetCircle.classList.add('active');

            document.getElementById('interactive-content').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
